details:
  en: "Before 1970, it is partly the total resident population. This is due\n      to
    the fact that data allowing to identify the different sub-groups of\n      the
    foreign population according to the definition used since 1970 -\n      are not
    available.;\n      1861-1969: retrospective calculations of the FSO\n      (based
    on the census and BEVNAT); 1970-2010: ESPOP; since 2011: STATPOP.\n      "
  de: "Vor 1970 teilweise die gesamte Wohnbevölkerung. Die Daten erlauben\n      nicht,
    die einzelnen ausländischen Bevölkerungsgruppen zu unterscheiden,\n      was die
    Ausweisung der ständigen Wohnbevölkerung gemäss der ab 1970 gültigen\n      Definitionen
    erlaubt hätte.;\n      1861-1969: Retrospektive Berechnungen des BFS (auf Basis
    von VZ und BEVNAT);\n      1970-2010: ESPOP; ab 2011: STATPOP.\n      "
  fr: "Avant 1970, il s'agit partiellement de la population résidante totale.\n      En
    effet, les données ne permettent pas d'identifier clairement les\n      différents
    sous-groupes de la population étrangère, ce qui aurait permis\n      de distinguer
    la population résidante permanente selon la définition en\n      vigueur à partir
    de 1970.;\n      1861-1969: calculs rétrospectifs de l'OFS (sur la base du RFP
    et de BEVNAT);\n      1970-2010: ESPOP; à partir de 2011: STATPOP.\n      "
  it: "Prima del 1970, si tratta in parte della popolazione residente totale.\n      In
    effetti, i dati non permettono di identificare chiaramente i diversi\n      sottogruppi
    della popolazione straniera, impendendo quindi di distinguere\n      la popolazione
    residente permanente secondo la definizione in vigore a\n      partire dal 1970.;\n
    \     1861-1969: calcoli retrospettivi dell'UST (sulla base del CFP e di BEVNAT);\n
    \     1970-2010: ESPOP; a partire dal 2011: STATPOP.\n      "
